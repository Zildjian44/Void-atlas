var TERRAIN={
  plains:  {name:"Plains",  bg:"#3a6e3a",hi:"#4e8a4e",passable:0},
  desert:  {name:"Desert",  bg:"#b88a28",hi:"#d4a83a",passable:0},

  mountain:{name:"Mountain",bg:"#7a7a7a",hi:"#989898",passable:1},
  ice:     {name:"Ice",     bg:"#58b0d0",hi:"#72c8e4",passable:1},

  lava:    {name:"Lava",    bg:"#c43000",hi:"#e04400",passable:2},
};
var TERRAIN_POOLS={
  "Rocky":    ["mountain","mountain","desert","rocky","mountain"],
  "Gas Giant":["plains","plains","rocky"],
  "Ice World":["mountain","rocky","ice","mountain"],
  "Volcanic": ["rocky","mountain","lava","rocky"],
  "Ocean":    ["plains","forest","plains","rocky"],
  "Desert":   ["rocky","mountain","desert","rocky"],
  "Jungle":   ["plains","forest","rocky","plains"],
  "Barren":   ["mountain","desert","rocky","mountain"],
};
var PRIMARY_TERRAIN={
  "Rocky":"rocky","Gas Giant":"plains","Ice World":"ice","Volcanic":"lava",
  "Ocean":"ocean","Desert":"desert","Jungle":"forest","Barren":"rocky",
};

var LANDING_TERRAIN={

  "Ocean":"plains","Desert":"desert","Jungle":"forest","Barren":"rocky",
};
var SHIPS={

};
var SELL_RATES={metals:2,crystals:4,tech:5,fuel:1};
var UPGRADES={
  shields:     [{cost:{crystals:20},desc:"Shield cap +25"},{cost:{crystals:35,tech:10},desc:"Shield cap +50"}],
  weapons:     [{cost:{metals:20,tech:5},desc:"Weapon dmg +10"},{cost:{metals:35,tech:15},desc:"Weapon dmg +20"}],

var C={
  bg:"#07071a",panel:"rgba(255,255,255,0.04)",border:"rgba(180,180,255,0.1)",
  cyan:"#00ffcc",purple:"#9955ff",blue:"#4488ff",red:"#ff4466",
  yellow:"#ffcc44",green:"#44ff88",orange:"#ff8844",text:"#dde0ff",dim:"#8899cc",
};
function bs(color,active){
  return {background:active?color+"18":"rgba(255,255,255,0.04)",border:"1px solid "+(active?color+"55":"rgba(255,255,255,0.08)"),color:active?color:C.dim,borderRadius:"10px",padding:"10px 16px",cursor:active?"pointer":"not-allowed",fontSize:"13px",fontFamily:"'Trebuchet MS',sans-serif",fontWeight:"600",letterSpacing:"0.5px",transition:"all 0.15s",boxShadow:active?"0 0 10px "+color+"22":"none"};
}

// ─── HELPERS ─────────────────────────────────────────────────
function roverCargoUsed(rover){var c=rover.cargo;return (c.metals||0)+(c.crystals||0)+(c.fuel||0)+(c.tech||0);}
function shipCargoUsed(player){return (player.resources.metals||0)+(player.resources.crystals||0)+(player.resources.tech||0);}
function shipCargoMax(player){return (player.cargoPods||4)*50;}

var PLANET_COLORS={
  "Rocky":    {h:22, s:35,l:38,hv:12},
  "Gas Giant":{h:32, s:85,l:52,hv:25},
  "Ice World":{h:198,s:65,l:72,hv:12},
  "Volcanic": {h:10, s:88,l:30,hv:8},
  "Ocean":    {h:212,s:78,l:36,hv:15},
  "Desert":   {h:36, s:72,l:50,hv:12},
  "Jungle":   {h:122,s:62,l:26,hv:15},
  "Barren":   {h:18, s:18,l:28,hv:10},
};
function makePlanetColor(type,rng){var pc=PLANET_COLORS[type]||{h:200,s:50,l:40,hv:20};return "hsl("+(pc.h+Math.floor(rng()*pc.hv*2)-pc.hv)+","+pc.s+"%,"+pc.l+"%)";}

var TERRAIN_RES={
  plains:  ["fuel","tech","fuel","tech","metals"],
  forest:  ["fuel","fuel","fuel","tech","tech"],
  desert:  ["metals","metals","crystals","tech"],
  rocky:   ["metals","metals","metals","crystals"],
  mountain:["metals","metals","crystals","crystals","tech"],
  ocean:   ["crystals","crystals","fuel","fuel","crystals"],
  ice:     ["crystals","crystals","fuel","crystals"],
  lava:    ["metals","metals","crystals","metals"],
};

function seededRand(seed){var s=seed+1;return function(){s=(s*1664525+1013904223)>>>0;return s/4294967296;};}

function generateSurface(systemId,planetId,planetType){
  var rand=seededRand(systemId*100+planetId*7);
  var W=20,H=20,lx=10,ly=10;
  var primaryType=PRIMARY_TERRAIN[planetType]||"plains";
  var grid=[];
  for(var y=0;y<H;y++){var row=[];for(var x=0;x<W;x++)row.push({type:primaryType,resource:null,resourceAmt:0,ruin:false,ruinLooted:false,creature:false,creatureType:null,revealed:false});grid.push(row);}
  var pool=TERRAIN_POOLS[planetType]||["plains","rocky","desert"];
  for(var w=0;w<8+Math.floor(rand()*6);w++){
    var ttype=pool[Math.floor(rand()*pool.length)];
    var cx=Math.floor(rand()*W),cy=Math.floor(rand()*H);
    for(var st=0;st<15+Math.floor(rand()*35);st++){
      if(cx>=0&&cx<W&&cy>=0&&cy<H)grid[cy][cx].type=ttype;
      if(rand()<0.2){cx=Math.floor(rand()*W);cy=Math.floor(rand()*H);}
      else{var dirs=[[0,1],[0,-1],[1,0],[-1,0]];var d=dirs[Math.floor(rand()*4)];cx=Math.max(0,Math.min(W-1,cx+d[0]));cy=Math.max(0,Math.min(H-1,cy+d[1]));}
    }
  }
  // Clear landing zone to a small 3x3 area of passable terrain (themed per planet)
  var landingType=LANDING_TERRAIN[planetType]||"plains";
  for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){var nx=lx+dx,ny=ly+dy;if(nx>=0&&nx<W&&ny>=0&&ny<H)grid[ny][nx].type=landingType;}
  for(var i=0;i<20+Math.floor(rand()*16);i++){
    var rx=Math.floor(rand()*W),ry=Math.floor(rand()*H);
    if(!grid[ry][rx].resource&&!grid[ry][rx].ruin){
      var tRes=TERRAIN_RES[grid[ry][rx].type]||["metals","crystals","fuel","tech"];
      grid[ry][rx].resource=tRes[Math.floor(rand()*tRes.length)];
      grid[ry][rx].resourceAmt=5+Math.floor(rand()*20);
    }
  }
  for(var ri=0;ri<Math.floor(rand()*4);ri++){for(var att=0;att<30;att++){var rrx=Math.floor(rand()*W),rry=Math.floor(rand()*H);if(!grid[rry][rrx].ruin&&!grid[rry][rrx].resource&&(Math.abs(rrx-lx)>3||Math.abs(rry-ly)>3)){grid[rry][rrx].ruin=true;break;}}}
  for(var ci=0;ci<3+Math.floor(rand()*6);ci++){for(var ca=0;ca<30;ca++){var crx=Math.floor(rand()*W),cry=Math.floor(rand()*H);if(!grid[cry][crx].creature&&!grid[cry][crx].ruin&&(Math.abs(crx-lx)>2||Math.abs(cry-ly)>2)){var r2=rand();grid[cry][crx].creature=true;grid[cry][crx].creatureType=r2<0.33?"passive":r2<0.66?"normal":"aggressive";break;}}}
  return grid;
}

function revealAround(grid,cx,cy,radius){
  var ng=grid.map(function(row){return row.map(function(t){return Object.assign({},t);});});
  for(var y=0;y<20;y++)for(var x=0;x<20;x++){if(Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy))<=radius)ng[y][x].revealed=true;}
  return ng;
}

function generateGalaxy(){
  var occupied={},systems=[];
  var namePool=NAMES.slice().sort(function(){return Math.random()-0.5;});
  while(systems.length<18){
    var x=Math.floor(Math.random()*GW),y=Math.floor(Math.random()*GH),key=x+","+y;
    if(!occupied[key]){
      occupied[key]=true;var id=systems.length;
      var sysName=namePool[id]||("Sys-"+id);
      var ec=id===0?0:Math.floor(Math.random()*3);
      var ROMAN=["I","II","III","IV","V"];
      var cRand=seededRand(id*13+7);
      var planets=[];var pc=2+Math.floor(Math.random()*4);
      for(var pi=0;pi<pc;pi++){
        var ptype=PLANET_TYPES[Math.floor(Math.random()*PLANET_TYPES.length)];
        planets.push({id:pi,name:sysName+" "+ROMAN[pi],type:ptype,color:makePlanetColor(ptype,cRand),scanned:false,surfaceStats:null,savedSurface:null});
      }
      var enemies=[];
      for(var ei=0;ei<ec;ei++){var t=ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];enemies.push(Object.assign({},t,{hull:t.maxHull,shields:t.maxShields,uid:Math.random()}));}
      systems.push({id:id,x:x,y:y,name:sysName,starColor:STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)],explored:id===0,planets:planets,enemies:enemies,artifactFragment:false,artifactCollected:false});
    }
  }
  systems.slice(1).sort(function(){return Math.random()-0.5;}).slice(0,6).forEach(function(s){s.artifactFragment=true;});
  return systems;
}
function getRevealedIds(systems,currentId,sensorRange){
  var cur=systems.find(function(s){return s.id===currentId;});
  var set=new Set();
  systems.forEach(function(s){if(s.explored)set.add(s.id);if(Math.abs(s.x-cur.x)<=sensorRange&&Math.abs(s.y-cur.y)<=sensorRange)set.add(s.id);});
  return set;
}
function isReachable(systems,fromId,toId,range){
  var a=systems.find(function(s){return s.id===fromId;}),b=systems.find(function(s){return s.id===toId;});
  if(!a||!b||a.id===b.id)return false;
  return Math.abs(a.x-b.x)<=range&&Math.abs(a.y-b.y)<=range;
}

function makeState(){
  return {
    view:"galaxy",systems:generateGalaxy(),currentSystemId:0,lastStarbaseId:0,
    player:{hull:100,maxHull:100,shields:50,maxShields:50,weaponDmg:18,engineRange:1,sensorRange:1,reactorMax:10,power:{shields:3,weapons:4,engines:3},resources:{metals:25,crystals:10,fuel:40,tech:5},credits:300,artifacts:0,cargoPods:6,shipType:"small",upgrades:{shields:0,weapons:0,engines:0,sensors:0,reactor:0,hull:0,roverChassis:0,roverSensor:0,roverLaser:0,roverCargo:0}},
    rover:{chassisLevel:0,sensorRadius:2,laserShots:3,maxLaserShots:3,cargoMax:50,cargo:{metals:0,crystals:0,fuel:0,tech:0}},
    combat:null,surface:null,orbitSystemId:null,orbitPlanetId:null,surfaceLog:[],
    log:["Void Atlas initialized. Hunt the 6 artifact fragments."],
  };
}

// ─── MINI COMPONENTS ────────────────────────────────────────
function StatBar(props){
  var pct=Math.max(0,Math.min(100,(props.val/Math.max(1,props.max))*100));
  return(
    <div style={{fontSize:"12px"}}>
      <div style={{color:C.dim,letterSpacing:"1px",marginBottom:"3px"}}>{props.label} <span style={{color:props.color}}>{props.val}</span></div>
      <div style={{background:"rgba(0,0,0,0.4)",borderRadius:"3px",height:"5px",border:"1px solid "+props.color+"22"}}>
        <div style={{width:pct+"%",height:"100%",borderRadius:"3px",background:"linear-gradient(90deg,"+props.color+"88,"+props.color+")",transition:"width 0.3s"}}/>
      </div>
    </div>
  );
}
function MiniBar(props){
  var pct=props.total>0?Math.round((props.val/props.total)*100):0;
  var barColor=pct===100?C.green:props.color;
  return(
    <div style={{marginBottom:"4px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",color:C.dim,marginBottom:"2px"}}>
        <span>{props.label}</span>
        <span style={{color:pct===100?C.green:C.text}}>{props.val}/{props.total} <span style={{color:barColor}}>({pct}%)</span></span>
      </div>
      <div style={{height:"4px",background:"rgba(255,255,255,0.08)",borderRadius:"2px"}}>
        <div style={{width:pct+"%",height:"100%",background:barColor,borderRadius:"2px",transition:"width 0.3s"}}/>
      </div>
    </div>
  );
}

function Header(props){
  var player=props.player,onRestart=props.onRestart,saveStatus=props.saveStatus;
  var usedCargo=shipCargoUsed(player),maxCargo=shipCargoMax(player);
  var cargoPct=maxCargo>0?Math.round((usedCargo/maxCargo)*100):0;
  var cargoColor=cargoPct>90?C.red:cargoPct>70?C.yellow:C.cyan;
  var dots=[];
  for(var i=0;i<6;i++)dots.push(<div key={i} style={{width:"10px",height:"10px",borderRadius:"2px",background:i<player.artifacts?"linear-gradient(135deg,#9955ff,#4488ff)":"rgba(255,255,255,0.07)",boxShadow:i<player.artifacts?"0 0 6px #9955ff88":"none"}}/>);
  var saveCol=saveStatus==="ok"?C.green:saveStatus==="err"?C.red:C.dim;
  return(
    <div style={{paddingTop:"calc(6px + env(safe-area-inset-top))",paddingLeft:"10px",paddingRight:"10px",paddingBottom:"6px",borderBottom:"1px solid "+C.border,background:"rgba(0,0,0,0.5)"}}>
      <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"5px"}}>
        <span style={{fontSize:"13px",fontWeight:"700",letterSpacing:"3px",color:"#fff",flexShrink:0}}>VOID ATLAS <span style={{fontSize:"9px",color:C.dim,letterSpacing:"1px"}}>b526</span></span>
        <div style={{display:"flex",gap:"8px",flex:1,justifyContent:"center",alignItems:"center"}}>
          <span style={{fontSize:"13px",color:C.green,fontWeight:"700"}}>H<span style={{color:C.text,marginLeft:"2px"}}>{Math.round(player.hull)}</span></span>
          <span style={{fontSize:"13px",color:C.blue,fontWeight:"700"}}>S<span style={{color:C.text,marginLeft:"2px"}}>{Math.round(player.shields)}</span></span>
          <span style={{fontSize:"13px",color:C.yellow,fontWeight:"700"}}>⛽<span style={{color:C.text,marginLeft:"2px"}}>{player.resources.fuel}</span></span>
          <span style={{fontSize:"13px",color:C.yellow,fontWeight:"700"}}>¢<span style={{color:C.text,marginLeft:"2px"}}>{player.credits}</span></span>
        </div>
        <div style={{display:"flex",gap:"3px",alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:"10px",color:saveCol}}>💾</span>
          <div style={{display:"flex",gap:"2px",marginLeft:"4px"}}>{dots}</div>
          <span style={{fontSize:"11px",color:C.dim,marginLeft:"3px"}}>{player.artifacts}/6</span>
          <button onClick={onRestart} style={{background:"rgba(255,68,102,0.1)",border:"1px solid rgba(255,68,102,0.3)",color:"rgba(255,100,130,0.9)",borderRadius:"5px",padding:"2px 6px",fontSize:"13px",cursor:"pointer",marginLeft:"5px"}}>↺</button>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <span style={{fontSize:"11px",color:C.dim,flexShrink:0}}>CARGO {usedCargo}/{maxCargo}</span>
        <div style={{flex:1,height:"4px",background:"rgba(255,255,255,0.08)",borderRadius:"2px"}}>
          <div style={{width:cargoPct+"%",height:"100%",background:cargoColor,borderRadius:"2px",transition:"width 0.3s"}}/>
        </div>
        <span style={{fontSize:"11px",color:C.dim,flexShrink:0}}>H{player.hull===player.maxHull?"✓":Math.round(player.hull)} S{player.shields===player.maxShields?"✓":Math.round(player.shields)}</span>
      </div>
    </div>
  );
}

// ─── GALAXY MAP ──────────────────────────────────────────────
function GalaxyView(props){
  var systems=props.systems,currentId=props.currentId,revealedIds=props.revealedIds,player=props.player,onTravel=props.onTravel;
  var cur=systems.find(function(s){return s.id===currentId;});
  var cells=[];
  for(var y=0;y<GH;y++)for(var x=0;x<GW;x++){
    var sys=systems.find(function(s){return s.x===x&&s.y===y;});
    var key=x+"-"+y;
    if(!sys||!revealedIds.has(sys.id)){cells.push(<div key={key} style={{height:"40px",borderRadius:"7px",background:"rgba(255,255,255,0.01)"}}/>);continue;}
    var isCurrent=sys.id===currentId;
    var canTravel=!isCurrent&&isReachable(systems,currentId,sys.id,player.engineRange)&&revealedIds.has(sys.id);
    (function(sc,ct){cells.push(
      <div key={key} onClick={ct?function(){onTravel(sc.id);}:null} style={{height:"40px",borderRadius:"7px",cursor:ct?"pointer":"default",background:isCurrent?"radial-gradient(circle at 40% 40%,"+sc.starColor+"33,rgba(255,255,255,0.04))":sc.explored?"radial-gradient(circle at 40% 40%,"+sc.starColor+"18,rgba(255,255,255,0.02))":"rgba(255,255,255,0.02)",border:isCurrent?"1px solid "+sc.starColor+"88":ct?"1px solid "+sc.starColor+"55":"1px solid rgba(255,255,255,0.06)",boxShadow:isCurrent?"0 0 14px "+sc.starColor+"44":ct?"0 0 6px "+sc.starColor+"22":"none",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
        <div style={{fontSize:"13px",color:sc.explored?sc.starColor:"#666"}}>{sc.explored?"✦":"?"}</div>
        {isCurrent&&<div style={{position:"absolute",top:"1px",right:"2px",fontSize:"6px",color:C.cyan,fontWeight:"700"}}>YOU</div>}
        {sc.artifactFragment&&sc.explored&&!sc.artifactCollected&&<div style={{position:"absolute",top:"1px",left:"2px",fontSize:"8px",color:C.purple}}>◆</div>}
        {sc.enemies.length>0&&sc.explored&&<div style={{position:"absolute",bottom:"1px",right:"2px",fontSize:"7px",color:C.red}}>⚠</div>}
        {ct&&<div style={{position:"absolute",bottom:"1px",left:"2px",fontSize:"7px",color:C.cyan,opacity:0.7}}>→</div>}
      </div>
    );})(sys,canTravel);
  }
  return(
    <div>
      <div style={{textAlign:"center",marginBottom:"10px",fontSize:"13px",letterSpacing:"3px",color:C.dim}}>GALAXY MAP</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat("+GW+",1fr)",gap:"4px",marginBottom:"12px"}}>{cells}</div>
      <div style={{fontSize:"12px",color:C.dim,textAlign:"center",lineHeight:"1.9"}}>
        Tap adjacent ✦ to travel (5 fuel) • ◆ artifact • ⚠ hostile<br/>
        M:{player.resources.metals} C:{player.resources.crystals} T:{player.resources.tech}
      </div>
    </div>
  );
}

// ─── SOLAR SYSTEM ────────────────────────────────────────────
function SolarSystemView(props){
  var system=props.system,onGalaxy=props.onGalaxy,onOrbitPlanet=props.onOrbitPlanet,onStarbase=props.onStarbase;
  if(!system)return null;
  var CX=150,CY=130,ORBIT_R=[38,62,84,103,120];
  var planetData=system.planets.map(function(p,i){
    var r=ORBIT_R[Math.min(i,ORBIT_R.length-1)];
    var angle=(i/system.planets.length)*Math.PI*2+0.9;
    var px=CX+r*Math.cos(angle),py=CY+r*Math.sin(angle);
    var labelY=py>CY?py+7+8:py-7-3;
    return Object.assign({},p,{r:6,orbitR:r,px:px,py:py,labelY:labelY});
  });
  var sbR=Math.min(ORBIT_R[Math.min(system.planets.length,ORBIT_R.length-1)]+14,118),sbAngle=Math.PI*1.25;
  var sbX=CX+sbR*Math.cos(sbAngle),sbY=CY+sbR*Math.sin(sbAngle);
  var allRings=[],seenR={};planetData.forEach(function(p){if(!seenR[p.orbitR]){seenR[p.orbitR]=true;allRings.push(p.orbitR);}});if(!seenR[sbR])allRings.push(sbR);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div><div style={{fontSize:"18px",fontWeight:"700",color:system.starColor}}>{system.name}</div><div style={{fontSize:"13px",color:C.dim}}>{system.planets.length} planets{system.enemies.length>0?<span style={{color:C.red}}> • ⚠ {system.enemies.length} hostile{system.enemies.length>1?"s":""}</span>:""}{system.artifactFragment&&!system.artifactCollected?<span style={{color:C.purple}}> • ◆ artifact</span>:""}</div></div>
        <button onClick={onGalaxy} style={bs(C.cyan,true)}>↩ Galaxy</button>
      </div>
      <svg width="100%" viewBox="0 0 300 270" style={{display:"block",marginBottom:"6px"}}>
        {allRings.map(function(r){return <circle key={r} cx={CX} cy={CY} r={r} fill="none" stroke="rgba(160,130,255,0.45)" strokeWidth="1.5"/>;})}
        <circle cx={CX} cy={CY} r="22" fill={system.starColor} opacity="0.12"/>
        <circle cx={CX} cy={CY} r="13" fill={system.starColor}/>
        <circle cx={CX-4} cy={CY-4} r="5" fill="white" opacity="0.35"/>
        <text x={CX} y={CY+23} textAnchor="middle" fill={system.starColor} fontSize="6" opacity="0.6">{system.name}</text>
        {planetData.map(function(p){return(
          <g key={p.id} onClick={function(){onOrbitPlanet(p.id);}} style={{cursor:"pointer"}}>
            <circle cx={p.px} cy={p.py} r={p.r+7} fill="transparent"/>
            <circle cx={p.px} cy={p.py} r={p.r} fill={p.color} stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
            <circle cx={p.px-p.r*0.3} cy={p.py-p.r*0.35} r={p.r*0.38} fill="white" opacity="0.14"/>
            {p.scanned&&<circle cx={p.px+p.r*0.7} cy={p.py-p.r*0.7} r="2" fill={C.cyan}/>}
            {p.surfaceStats&&p.surfaceStats.collectedRes===p.surfaceStats.totalRes&&p.surfaceStats.totalRes>0&&<circle cx={p.px-p.r*0.7} cy={p.py-p.r*0.7} r="2" fill={C.green}/>}
            <text x={p.px} y={p.labelY} textAnchor="middle" fill={p.color} fontSize="6.5" fontWeight="600" opacity="0.95">{p.name}</text>
          </g>
        );})}
        <g onClick={onStarbase} style={{cursor:"pointer"}}>
          {/* Hit area */}
          <rect x={sbX-22} y={sbY-18} width="44" height="38" fill="transparent"/>
          {/* Glow ring */}
          <circle cx={sbX} cy={sbY} r="11" fill="none" stroke={C.purple} strokeWidth="0.5" opacity="0.3"/>
          {/* E/W arms */}
          <rect x={sbX-16} y={sbY-1.5} width="32" height="3" fill="#0c0828" stroke={C.purple} strokeWidth="0.6" opacity="0.9"/>
          {/* N arm */}
          <rect x={sbX-1.5} y={sbY-14} width="3" height="12" fill="#0c0828" stroke={C.blue} strokeWidth="0.5" opacity="0.9"/>
          {/* Solar panels W */}
          <rect x={sbX-21} y={sbY-5} width="6" height="10" fill="#0a1428" stroke={C.blue} strokeWidth="0.6"/>
          <line x1={sbX-18} y1={sbY-5} x2={sbX-18} y2={sbY+5} stroke={C.blue} strokeWidth="0.5" opacity="0.5"/>
          {/* Solar panels E */}
          <rect x={sbX+15} y={sbY-5} width="6" height="10" fill="#0a1428" stroke={C.blue} strokeWidth="0.6"/>
          <line x1={sbX+18} y1={sbY-5} x2={sbX+18} y2={sbY+5} stroke={C.blue} strokeWidth="0.5" opacity="0.5"/>
          {/* Running lights */}
          <circle cx={sbX-20} cy={sbY} r="1.5" fill={C.blue} opacity="0.9"/>
          <circle cx={sbX+20} cy={sbY} r="1.5" fill={C.blue} opacity="0.9"/>
          <circle cx={sbX} cy={sbY-14} r="1.2" fill={C.red} opacity="0.8"/>
          {/* Central hub */}
          <circle cx={sbX} cy={sbY} r="6" fill="#140830" stroke={C.purple} strokeWidth="1.2"/>
          <circle cx={sbX} cy={sbY} r="3" fill={C.purple} opacity="0.85"/>
          {/* Label */}
          <text x={sbX} y={sbY+21} textAnchor="middle" fill={C.purple} fontSize="5.5" letterSpacing="0.5" opacity="0.85">STARBASE</text>
        </g>
      </svg>
      <div style={{textAlign:"center",fontSize:"13px",color:C.dim}}>Tap a planet to orbit • Tap ⬡ for starbase</div>
    </div>
  );
}

// ─── PLANET SVG ──────────────────────────────────────────────
function PlanetSVG(props){
  var planet=props.planet,systemId=props.systemId;
  var rand=seededRand(systemId*17+(planet.id||0)*31+99);
  var type=planet.type;
  var uid="plt"+systemId+"x"+(planet.id||0);
  var PCONF={
    "Ocean":    {base:"#0d3a7a",land:"#2a6030",cloud:true, atm:"#4a8aff"},
    "Volcanic": {base:"#1e0600",dark:"#0a0200",lava:"#dd3300",glow:"#ff6600",atm:"#cc3300"},
    "Ice World":{base:"#4a9ec0",dark:"#2a7090",ice:"#e8f4ff",atm:"#aaddff"},
    "Desert":   {base:"#c49428",dark:"#8a6618",dune:"#a07828",atm:"#d4aa44"},
    "Jungle":   {base:"#1a4220",patch:"#2a6034",water:"#1a5a8a",atm:"#44aa44"},
    "Rocky":    {base:"#6a5848",dark:"#3e2e22",atm:null},
    "Gas Giant":{base:"#c86020",band1:"#e08040",band2:"#f0a060",dark:"#9a4010",storm:"#ff8800",atm:"#ffaa44"},
    "Barren":   {base:"#484038",dark:"#28201c",atm:null},
  };
  var c=PCONF[type]||{base:planet.color,dark:"#333",atm:null};
  var f=[];
  function ri(min,max){return min+Math.floor(rand()*(max-min));}
  function rf(min,max){return min+rand()*(max-min);}

  if(type==="Gas Giant"){
    var bYs=[-36,-24,-12,0,11,23,35],bCs=[c.band1,c.band2,c.dark,c.band1,c.band2,c.dark,c.band1];
    for(var i=0;i<bYs.length;i++)f.push(<rect key={"b"+i} x="6" y={50+bYs[i]} width="88" height={ri(11,17)} fill={bCs[i%bCs.length]} opacity="0.65"/>);
    var sx=ri(20,55),sy=ri(42,58);
    f.push(<ellipse key="s1" cx={sx} cy={sy} rx={ri(10,16)} ry={ri(5,8)} fill={c.storm} opacity="0.85"/>);
    f.push(<ellipse key="s2" cx={sx} cy={sy} rx={ri(6,10)} ry={ri(3,5)} fill="#ffcc00" opacity="0.9"/>);
  }
  else if(type==="Ocean"){
    var ld=[{x:ri(25,45),y:ri(20,35),rx:ri(10,18),ry:ri(7,13),a:ri(0,60)},{x:ri(50,70),y:ri(55,70),rx:ri(8,16),ry:ri(6,12),a:ri(0,60)},{x:ri(15,30),y:ri(58,72),rx:ri(6,12),ry:ri(5,10),a:ri(0,60)}];
    ld.forEach(function(l,i){f.push(<ellipse key={"l"+i} cx={l.x} cy={l.y} rx={l.rx} ry={l.ry} fill={c.land} opacity="0.85" transform={"rotate("+l.a+","+l.x+","+l.y+")"}/>);});
    for(var i=0;i<4;i++){var cx2=ri(10,85),cy2=ri(10,85);f.push(<ellipse key={"cl"+i} cx={cx2} cy={cy2} rx={ri(8,18)} ry={ri(4,9)} fill="white" opacity={rf(0.15,0.3)}/>);}
  }
  else if(type==="Volcanic"){
    for(var i=0;i<5;i++){var px=ri(8,85),py=ri(8,85);f.push(<ellipse key={"dk"+i} cx={px} cy={py} rx={ri(6,18)} ry={ri(5,13)} fill={c.dark} opacity="0.75"/>);}
    for(var i=0;i<5;i++){var lx1=ri(5,95),ly1=ri(5,95),lx2=lx1+ri(-25,25),ly2=ly1+ri(-25,25);f.push(<line key={"lv"+i} x1={lx1} y1={ly1} x2={lx2} y2={ly2} stroke={c.lava} strokeWidth={rf(1,3)} opacity="0.8"/>);}
    for(var i=0;i<4;i++){var lpx=ri(15,80),lpy=ri(15,80);f.push(<circle key={"lp"+i} cx={lpx} cy={lpy} r={ri(3,7)} fill={c.glow} opacity="0.9"/>);}
  }
  else if(type==="Ice World"){
    for(var i=0;i<5;i++){var ipx=ri(10,85),ipy=ri(10,85);f.push(<ellipse key={"ic"+i} cx={ipx} cy={ipy} rx={ri(5,18)} ry={ri(3,9)} fill={c.ice} opacity={rf(0.25,0.55)}/>);}
    f.push(<ellipse key="cap1" cx="50" cy="8" rx="30" ry="13" fill={c.ice} opacity="0.9"/>);
    f.push(<ellipse key="cap2" cx="50" cy="93" rx="24" ry="10" fill={c.ice} opacity="0.7"/>);
  }
  else if(type==="Desert"){
    for(var i=0;i<5;i++){var dy=12+i*16+ri(0,8);f.push(<ellipse key={"du"+i} cx="50" cy={dy} rx="44" ry={ri(4,8)} fill={c.dune} opacity="0.35"/>);}
    for(var i=0;i<5;i++){var rpx=ri(8,85),rpy=ri(8,85);f.push(<ellipse key={"rk"+i} cx={rpx} cy={rpy} rx={ri(3,12)} ry={ri(2,8)} fill={c.dark} opacity="0.55"/>);}
  }
  else if(type==="Jungle"){
    for(var i=0;i<7;i++){var fpx=ri(5,90),fpy=ri(5,90);f.push(<circle key={"fp"+i} cx={fpx} cy={fpy} r={ri(6,15)} fill={c.patch} opacity="0.55"/>);}
    for(var i=0;i<3;i++){var wpx=ri(18,72),wpy=ri(18,72);f.push(<ellipse key={"wp"+i} cx={wpx} cy={wpy} rx={ri(4,12)} ry={ri(3,9)} fill={c.water} opacity="0.8"/>);}
  }
  else if(type==="Rocky"||type==="Barren"){
    for(var i=0;i<8;i++){var crx=ri(8,85),cry=ri(8,85),crr=ri(3,11);f.push(<circle key={"c"+i} cx={crx} cy={cry} r={crr} fill={c.dark} opacity="0.8"/>);f.push(<circle key={"cr"+i} cx={crx} cy={cry} r={crr} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1"/>);}
  }

  return(
    <svg width="180" height="180" viewBox="0 0 100 100" style={{display:"block"}}>
      <defs>
        <clipPath id={uid+"c"}><circle cx="50" cy="50" r="44"/></clipPath>
        <radialGradient id={uid+"lg"} cx="32%" cy="28%" r="72%">
          <stop offset="0%" stopColor="white" stopOpacity="0.28"/>
          <stop offset="45%" stopColor="white" stopOpacity="0"/>
          <stop offset="100%" stopColor="black" stopOpacity="0.62"/>
        </radialGradient>
      </defs>
      {c.atm&&<circle cx="50" cy="50" r="48" fill="none" stroke={c.atm} strokeWidth="7" opacity="0.22"/>}
      <circle cx="50" cy="50" r="44" fill={c.base}/>
      <g clipPath={"url(#"+uid+"c)"}>{f}</g>
      <circle cx="50" cy="50" r="44" fill={"url(#"+uid+"lg)"} clipPath={"url(#"+uid+"c)"}/>
    </svg>
  );
}

// ─── ORBIT VIEW ──────────────────────────────────────────────
function OrbitView(props){
  var planet=props.planet,system=props.system,onBack=props.onBack,onScan=props.onScan,onLand=props.onLand,sensorLevel=props.sensorLevel;
  if(!planet||!system)return null;
  var RES_COLORS={metals:C.orange,crystals:C.blue,fuel:C.yellow,tech:C.cyan};
  var surfaceGrid=planet.scanned?generateSurface(system.id,planet.id,planet.type):null;
  var stats=planet.surfaceStats;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <div><div style={{fontSize:"18px",fontWeight:"700",color:planet.color}}>{planet.type}</div><div style={{fontSize:"13px",color:C.dim}}>{system.name} system</div></div>
        <button onClick={onBack} style={bs(C.dim,true)}>← System</button>
      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:"14px"}}>
        <PlanetSVG planet={planet} systemId={system.id}/>
      </div>

      {stats&&(
        <div style={{background:C.panel,border:"1px solid "+C.border,borderRadius:"12px",padding:"10px 12px",marginBottom:"12px"}}>
          <div style={{fontSize:"12px",letterSpacing:"2px",color:C.dim,marginBottom:"8px"}}>SURVEY COMPLETION</div>
          <MiniBar label="Resources collected" val={stats.collectedRes} total={stats.totalRes} color={C.orange}/>
          {stats.totalRuins>0&&<MiniBar label="Ruins discovered" val={stats.lootedRuins} total={stats.totalRuins} color={C.yellow}/>}
        </div>
      )}

      {planet.scanned&&(
        <div style={{marginBottom:"14px"}}>
          <div style={{fontSize:"12px",letterSpacing:"2px",color:C.dim,marginBottom:"6px",textAlign:"center"}}>
            {sensorLevel===0?"ROUGH SURFACE SCAN":sensorLevel===1?"FULL TERRAIN MAPPING":"FULL MAPPING + RESOURCES"}
          </div>

          {sensorLevel===0&&surfaceGrid&&(function(){
            var rough=[];
            for(var ry2=0;ry2<5;ry2++)for(var rx2=0;rx2<5;rx2++){
              var sy=Math.min(ry2*4,19),sx=Math.min(rx2*4,19);
              rough.push({x:rx2,y:ry2,type:surfaceGrid[sy][sx].type});
            }
            return(
              <div style={{display:"flex",justifyContent:"center"}}>
                <svg width="160" height="160" viewBox="0 0 5 5" style={{borderRadius:"8px",border:"1px solid "+C.border,imageRendering:"pixelated"}}>
                  {rough.map(function(cell){var t=TERRAIN[cell.type]||TERRAIN.plains;return <rect key={cell.x+","+cell.y} x={cell.x} y={cell.y} width={1} height={1} fill={t.bg}/>;} )}
                  <circle cx="2.5" cy="2.5" r="0.35" fill={C.cyan} opacity="0.8"/>
                </svg>
              </div>
            );
          })()}

          {sensorLevel>=1&&surfaceGrid&&(
            <div style={{display:"flex",justifyContent:"center"}}>
              <svg width="160" height="160" viewBox="0 0 20 20" style={{borderRadius:"8px",border:"1px solid "+C.border,imageRendering:"pixelated"}}>
                {surfaceGrid.map(function(row,y){return row.map(function(tile,x){
                  var terrain=TERRAIN[tile.type]||TERRAIN.plains;
                  var resCol=sensorLevel>=2&&tile.resource?RES_COLORS[tile.resource]:null;
                  return(<g key={x+","+y}><rect x={x} y={y} width={1} height={1} fill={terrain.bg}/>{resCol&&<circle cx={x+0.5} cy={y+0.5} r="0.22" fill={resCol} opacity="0.9"/>}</g>);
                });} )}
                <circle cx="10.5" cy="10.5" r="0.5" fill={C.cyan} opacity="0.9"/>
              </svg>
            </div>
          )}

          {sensorLevel===0&&<div style={{fontSize:"12px",color:C.dim,textAlign:"center",marginTop:"4px"}}>Upgrade sensors for full terrain mapping</div>}
          {sensorLevel===1&&<div style={{fontSize:"12px",color:C.dim,textAlign:"center",marginTop:"4px"}}>Upgrade sensors further to detect resources</div>}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
        <button onClick={onScan} style={bs(C.cyan,!planet.scanned)}>{planet.scanned?"✓ Scanned":"🔭 Scan Planet"}</button>
        <button onClick={onLand} style={bs(C.green,true)}>🚀 Land</button>
      </div>
    </div>
  );
}

// ─── SURFACE VIEW ────────────────────────────────────────────
function SurfaceView(props){
  var surface=props.surface,rover=props.rover,player=props.player,onMove=props.onMove,onLaser=props.onLaser,onLiftoff=props.onLiftoff,surfaceLog=props.surfaceLog,system=props.system,planet=props.planet,roverSensorLevel=props.roverSensorLevel||0;
  if(!surface)return null;
  var grid=surface.grid,rx=surface.roverX,ry=surface.roverY;
  var availW=Math.min(window.innerWidth,480);
  var availH=window.innerHeight-220; // minus header+surface top+cargo bar+log+bottom bar
  var CELL=Math.min(Math.floor(availW/20),Math.floor(availH/20));
  var currentTerrain=TERRAIN[grid[ry][rx].type]||TERRAIN.plains;
  var usedRC=roverCargoUsed(rover),maxRC=rover.cargoMax;
  var rcPct=maxRC>0?Math.round((usedRC/maxRC)*100):0;
  var rcColor=rcPct>90?C.red:rcPct>70?C.yellow:C.green;
  var adjCreatures=[];
  for(var dy2=-1;dy2<=1;dy2++)for(var dx2=-1;dx2<=1;dx2++){if(dx2===0&&dy2===0)continue;var nx2=rx+dx2,ny2=ry+dy2;if(nx2>=0&&nx2<20&&ny2>=0&&ny2<20&&grid[ny2][nx2].revealed&&grid[ny2][nx2].creature)adjCreatures.push({x:nx2,y:ny2});}
  var resColors={metals:C.orange,crystals:C.blue,fuel:C.yellow,tech:C.cyan};
  var stats=planet?planet.surfaceStats:null;
  var shipUsed=shipCargoUsed(player),shipMax=shipCargoMax(player),shipSpace=shipMax-shipUsed;
  var roverNonFuel=(rover.cargo.metals||0)+(rover.cargo.crystals||0)+(rover.cargo.tech||0);
  var willLose=Math.max(0,roverNonFuel-shipSpace);
  var shipCargoFull=shipSpace<=0&&roverNonFuel>0;
  return(
    <div style={{overflow:"hidden",margin:"0 -12px",padding:"0 8px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
        <div>
          <div style={{fontSize:"16px",fontWeight:"700",color:C.green}}>{planet?planet.name:"Surface"}</div>
          <div style={{fontSize:"13px",color:C.dim}}>{currentTerrain.name} · {system?system.name:""} · 🔫{rover.laserShots}/{rover.maxLaserShots}</div>
        </div>
        <button onClick={onLiftoff} style={bs(willLose>0?C.red:C.orange,true)}>↑ Lift Off{willLose>0?" ⚠":""}</button>
      </div>

      {willLose>0&&(
        <div style={{background:"rgba(255,68,102,0.1)",border:"1px solid "+C.red+"55",borderRadius:"8px",padding:"6px 10px",marginBottom:"6px",fontSize:"13px",color:C.red}}>
          ⚠ Lifting off loses <span style={{fontWeight:"700"}}>{willLose} units</span> — sell at starbase first.
        </div>
      )}

      <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"5px"}}>
        <span style={{fontSize:"12px",color:C.green,flexShrink:0,minWidth:"28px"}}>🚗</span>
        <div style={{flex:1,height:"5px",background:"rgba(255,255,255,0.08)",borderRadius:"3px"}}><div style={{width:rcPct+"%",height:"100%",background:rcColor,borderRadius:"3px"}}/></div>
        <span style={{fontSize:"12px",color:rcColor,flexShrink:0,minWidth:"55px",textAlign:"right"}}>{usedRC}/{maxRC}</span>
        <span style={{fontSize:"12px",color:C.cyan,flexShrink:0,minWidth:"28px"}}>🚀</span>
        <div style={{flex:1,height:"5px",background:"rgba(255,255,255,0.08)",borderRadius:"3px"}}><div style={{width:Math.round((shipUsed/Math.max(1,shipMax))*100)+"%",height:"100%",background:shipSpace===0?C.red:C.cyan,borderRadius:"3px"}}/></div>
        <span style={{fontSize:"12px",color:shipSpace===0?C.red:C.dim,flexShrink:0,minWidth:"55px",textAlign:"right"}}>{shipUsed}/{shipMax}</span>
        {stats&&<span style={{fontSize:"12px",color:C.orange,flexShrink:0,marginLeft:"4px"}}>⛏{stats.collectedRes}/{stats.totalRes}</span>}
      </div>

      <div style={{marginBottom:"6px",borderRadius:"8px",border:"1px solid "+C.border,background:"#07071a",cursor:"crosshair",overflow:"hidden"}}
        onClick={function(e){
          var cont=e.currentTarget;
          var rect=cont.getBoundingClientRect();
          var tapGX=Math.floor((e.clientX-rect.left+cont.scrollLeft)/CELL);
          var tapGY=Math.floor((e.clientY-rect.top+cont.scrollTop)/CELL);
          if(tapGX<0||tapGX>=20||tapGY<0||tapGY>=20)return;
          var mx=tapGX<7?-1:tapGX>12?1:0;
          var my=tapGY<7?-1:tapGY>12?1:0;
          if(mx===0&&my===0)return;
          var nx=rx+mx,ny=ry+my;
          if(nx<0||nx>=20||ny<0||ny>=20)return;
          var tt=grid[ny][nx];
          if(!tt.revealed)return;
          if(tt.creature&&rover.laserShots>0){onLaser(nx,ny);return;}
          var terr=TERRAIN[tt.type]||TERRAIN.plains;
          if(!tt.creature&&terr.passable<=rover.chassisLevel)onMove(nx,ny);
        }}>
        <div style={{width:20*CELL+"px"}}>
          {grid.map(function(row,y){return(
            <div key={y} style={{display:"flex"}}>
              {row.map(function(tile,x){
                var isRover=(x===rx&&y===ry);
                var isAdj=Math.abs(x-rx)<=1&&Math.abs(y-ry)<=1&&!isRover;
                var terrain=TERRAIN[tile.type]||TERRAIN.plains;
                var passOk=terrain.passable<=rover.chassisLevel;
                if(!tile.revealed)return <div key={x} style={{width:CELL+"px",height:CELL+"px",background:"#07071a",flexShrink:0,borderRight:"1px solid #1e1e40",borderBottom:"1px solid #1e1e40"}}/>;
                var bg=isRover?"#004444":terrain.bg;
                var borderCol=isRover?C.cyan:isAdj&&passOk&&!tile.creature?"rgba(255,255,255,0.15)":"transparent";
                var creatureIcon=null;
                if(tile.creature){
                  if(roverSensorLevel===0)creatureIcon=<div style={{fontSize:"8px",lineHeight:1,color:"#888"}}>👾</div>;
                  else if(roverSensorLevel===1){if(tile.creatureType==="passive")creatureIcon=<div style={{fontSize:"8px",lineHeight:1,opacity:0.5}}>👾</div>;else creatureIcon=<div style={{fontSize:"8px",lineHeight:1}}>👾</div>;}
                  else{if(tile.creatureType==="passive")creatureIcon=<div style={{fontSize:"8px",lineHeight:1}}>🐛</div>;else if(tile.creatureType==="normal")creatureIcon=<div style={{fontSize:"8px",lineHeight:1}}>👾</div>;else creatureIcon=<div style={{fontSize:"8px",lineHeight:1,color:C.red}}>🔴</div>;}
                }
                return(
                  <div key={x} style={{width:CELL+"px",height:CELL+"px",background:bg,flexShrink:0,border:"1px solid "+borderCol,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",boxSizing:"border-box"}}>
                    {isRover&&(
                      <svg width="13" height="11" viewBox="0 0 13 11" style={{overflow:"visible"}}>
                        <ellipse cx="2.8" cy="9" rx="2" ry="1.8" fill={C.cyan} opacity="0.9"/>
                        <ellipse cx="10.2" cy="9" rx="2" ry="1.8" fill={C.cyan} opacity="0.9"/>
                        <rect x="1" y="3" width="11" height="5.5" rx="1.5" fill={C.cyan} opacity="0.9"/>
                        <rect x="2.5" y="4.2" width="8" height="2.8" rx="0.8" fill="#07071a" opacity="0.75"/>
                        <line x1="6.5" y1="3" x2="6.5" y2="0.8" stroke={C.cyan} strokeWidth="1" opacity="0.9"/>
                        <circle cx="6.5" cy="0.8" r="1" fill={C.cyan}/>
                        <rect x="1" y="3" width="11" height="5.5" rx="1.5" fill="none" stroke="white" strokeWidth="0.4" opacity="0.25"/>
                      </svg>
                    )}
                    {!isRover&&tile.creature&&creatureIcon}
                    {!isRover&&!tile.creature&&tile.ruin&&!tile.ruinLooted&&<div style={{fontSize:"8px",color:"#ffcc44",lineHeight:1}}>✦</div>}
                    {!isRover&&!tile.creature&&tile.ruin&&tile.ruinLooted&&<div style={{fontSize:"7px",color:"#444",lineHeight:1}}>✦</div>}
                    {!isRover&&!tile.creature&&!tile.ruin&&tile.resource&&<div style={{width:"6px",height:"6px",borderRadius:"50%",background:resColors[tile.resource]||C.dim,flexShrink:0,boxShadow:"0 0 2px rgba(0,0,0,0.8)"}}/>}
                    {!isRover&&!tile.creature&&!tile.ruin&&!tile.resource&&!passOk&&<div style={{fontSize:"7px",color:"rgba(255,255,255,0.2)",lineHeight:1}}>{terrain.passable===1?"▲":"≈"}</div>}
                  </div>
                );
              })}
            </div>
          );})}
        </div>
      </div>

      {adjCreatures.length>0&&rover.laserShots>0&&<div style={{background:"rgba(255,68,102,0.08)",border:"1px solid "+C.red+"44",borderRadius:"10px",padding:"8px 12px",marginBottom:"8px",fontSize:"13px",color:C.red}}>⚠ Creature nearby — tap to laser ({rover.laserShots} shots left)</div>}
      {adjCreatures.length>0&&rover.laserShots<=0&&<div style={{background:"rgba(255,68,102,0.05)",border:"1px solid "+C.red+"22",borderRadius:"10px",padding:"8px 12px",marginBottom:"8px",fontSize:"13px",color:C.dim}}>⚠ Creature adjacent — no shots. Avoid or lift off.</div>}

      <div style={{fontSize:"12px",color:C.dim,marginBottom:"6px"}}>
        {roverSensorLevel===0&&"👾 Unknown creature"}
        {roverSensorLevel===1&&"👾 Threat  👾(dim) Passive"}
        {roverSensorLevel>=2&&"🐛 Passive  👾 Normal  🔴 Aggressive"}
        <span style={{marginLeft:"8px",color:C.orange}}>●M</span><span style={{color:C.blue,marginLeft:"4px"}}>●C</span><span style={{color:C.yellow,marginLeft:"4px"}}>●F</span><span style={{color:C.cyan,marginLeft:"4px"}}>●T</span>
        <span style={{color:"#ffcc44",marginLeft:"6px"}}>✦ Ruin</span>
      </div>

      {surfaceLog.length>0&&(
        <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"8px",padding:"6px 10px",marginTop:"6px",fontSize:"13px"}}>
          {surfaceLog.slice(0,4).map(function(l,i){
            var col=l.indexOf("★")>=0?C.yellow:l.indexOf("attacks")>=0||l.indexOf("hull")>=0?C.red:l.indexOf("RUIN")>=0?"#ffcc88":l.indexOf("Collected")>=0||l.indexOf("eliminated")>=0?C.cyan:l.indexOf("cargo full")>=0||l.indexOf("lost")>=0?C.orange:l.indexOf("Returned")>=0||l.indexOf("Landed")>=0?C.green:C.dim;
            return <div key={i} style={{opacity:Math.max(0.4,1-i*0.2),color:col,marginBottom:"2px"}}>▶ {l}</div>;
          })}
        </div>
      )}
    </div>
  );
}

// ─── COMBAT ──────────────────────────────────────────────────
function CombatView(props){
  var combat=props.combat,player=props.player,onAction=props.onAction,onPower=props.onPower;
  var enemy=combat.enemy,env=combat.env,combatLog=combat.combatLog;
  var inNebula=env==="nebula",inAsteroids=env==="asteroids";
  var powerRows=[{k:"shields",label:"SHIELDS",color:C.blue},{k:"weapons",label:"WEAPONS",color:C.red},{k:"engines",label:"ENGINES",color:C.green}];
  return(
    <div>
      {env!=="normal"&&<div style={{background:inNebula?"rgba(153,85,255,0.1)":"rgba(255,136,68,0.08)",border:"1px solid "+(inNebula?C.purple+"55":C.orange+"55"),borderRadius:"10px",padding:"8px 12px",marginBottom:"10px",fontSize:"13px",textAlign:"center",color:inNebula?C.purple:C.orange}}>{inNebula?"⚡ NEBULA — All shields offline":"☄ ASTEROID FIELD — Missiles may be blocked"}</div>}
      <div style={{background:C.panel,border:"1px solid "+C.red+"44",borderRadius:"14px",padding:"14px",marginBottom:"10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
          <div><div style={{fontSize:"17px",fontWeight:"700",color:C.red}}>{enemy.name}</div><div style={{fontSize:"13px",color:C.dim}}>ATK: {enemy.atk}</div></div>
          <div style={{fontSize:"28px",lineHeight:1}}>{enemy.icon}</div>
        </div>
        <StatBar label="HULL" val={Math.max(0,Math.round(enemy.hull))} max={enemy.maxHull} color={C.red}/>
        <div style={{marginTop:"6px"}}><StatBar label="SHIELDS" val={inNebula?0:Math.max(0,Math.round(enemy.shields))} max={Math.max(1,enemy.maxShields)} color={C.blue}/></div>
      </div>
      <div style={{background:C.panel,border:"1px solid "+C.border,borderRadius:"12px",padding:"12px",marginBottom:"10px"}}>
        <div style={{fontSize:"12px",letterSpacing:"2px",color:C.dim,marginBottom:"8px"}}>POWER ALLOCATION ({player.reactorMax} pts)</div>
        {powerRows.map(function(row){return(
          <div key={row.k} style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
            <div style={{width:"56px",fontSize:"13px",color:C.dim,letterSpacing:"1px"}}>{row.label}</div>
            <button onClick={function(){onPower(row.k,-1);}} style={Object.assign({},bs(row.color,true),{padding:"2px 10px",fontSize:"16px",lineHeight:1})}>−</button>
            <div style={{flex:1,background:"rgba(0,0,0,0.35)",borderRadius:"4px",height:"9px",overflow:"hidden"}}><div style={{width:(player.power[row.k]/player.reactorMax)*100+"%",height:"100%",borderRadius:"4px",background:"linear-gradient(90deg,"+row.color+"88,"+row.color+")",transition:"width 0.2s"}}/></div>
            <div style={{width:"18px",textAlign:"center",fontSize:"12px",color:row.color,fontWeight:"700"}}>{player.power[row.k]}</div>
            <button onClick={function(){onPower(row.k,1);}} style={Object.assign({},bs(row.color,true),{padding:"2px 10px",fontSize:"16px",lineHeight:1})}>+</button>
          </div>
        );})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"10px"}}>
        <button onClick={function(){onAction("laser");}} style={bs(C.cyan,true)}>🔵<br/><span style={{fontSize:"13px"}}>Laser</span></button>
        <button onClick={function(){onAction("missile");}} style={bs(C.orange,true)}>🚀<br/><span style={{fontSize:"13px"}}>Missile{inAsteroids?" ⚠":""}</span></button>
        <button onClick={function(){onAction("flee");}} style={bs(C.dim,true)}>💨<br/><span style={{fontSize:"13px"}}>Flee</span></button>
      </div>
      <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"10px",padding:"10px 12px",fontSize:"13px",color:C.dim,maxHeight:"90px",overflow:"auto"}}>
        {combatLog.filter(Boolean).slice(0,6).map(function(l,i){return <div key={i} style={{marginBottom:"3px",opacity:Math.max(0.3,1-i*0.15)}}>▶ {l}</div>;})}
      </div>
    </div>
  );
}

// ─── STATION SVG ─────────────────────────────────────────────
function StationSVG(props){
  var shipType=props.shipType||"small";
  var shipColor=C.cyan;
  var cx=150,cy=75;
  // Stars
  var sr=seededRand(777);
  var stars=[];
  for(var si=0;si<35;si++){stars.push(<circle key={"s"+si} cx={Math.floor(sr()*300)} cy={Math.floor(sr()*170)} r={sr()<0.15?1.5:0.7} fill="white" opacity={0.2+sr()*0.6}/>);}
  // Hexagon hub
  var hexPts=[];
  for(var hi=0;hi<6;hi++){var ha=(hi*60-30)*Math.PI/180;hexPts.push((cx+26*Math.cos(ha)).toFixed(1)+","+(cy+26*Math.sin(ha)).toFixed(1));}
  // Ship shape based on type
  var shipPts=shipType==="large"?
    (cx+","+(cy+92)+" "+(cx-10)+","+(cy+112)+" "+(cx-4)+","+(cy+112)+" "+(cx-4)+","+(cy+120)+" "+(cx+4)+","+(cy+120)+" "+(cx+4)+","+(cy+112)+" "+(cx+10)+","+(cy+112)):
    shipType==="medium"?
    (cx+","+(cy+92)+" "+(cx-8)+","+(cy+108)+" "+(cx-3)+","+(cy+108)+" "+(cx-3)+","+(cy+115)+" "+(cx+3)+","+(cy+115)+" "+(cx+3)+","+(cy+108)+" "+(cx+8)+","+(cy+108)):
    (cx+","+(cy+92)+" "+(cx-6)+","+(cy+105)+" "+(cx+6)+","+(cy+105));
  return(
    <svg width="100%" viewBox="0 0 300 170" style={{borderRadius:"12px",marginBottom:"12px",display:"block"}}>
      <rect width="300" height="170" fill="#030318" rx="12"/>
      {stars}
      {/* Outer glow ring */}
      <circle cx={cx} cy={cy} r="62" fill="none" stroke={C.purple} strokeWidth="0.6" opacity="0.2"/>
      <circle cx={cx} cy={cy} r="57" fill="none" stroke={C.blue} strokeWidth="0.5" opacity="0.15" strokeDasharray="4 3"/>
      {/* W arm */}
      <rect x={cx-72} y={cy-3} width="46" height="6" fill="#12122e" stroke={C.blue} strokeWidth="0.5" opacity="0.9"/>
      {/* E arm */}
      <rect x={cx+26} y={cy-3} width="46" height="6" fill="#12122e" stroke={C.blue} strokeWidth="0.5" opacity="0.9"/>
      {/* N arm */}
      <rect x={cx-3} y={cy-68} width="6" height="42" fill="#12122e" stroke={C.blue} strokeWidth="0.5" opacity="0.9"/>
      {/* S docking arm */}
      <rect x={cx-3} y={cy+26} width="6" height="60" fill="#12122e" stroke={C.purple} strokeWidth="0.6" opacity="0.9"/>
      {/* W solar panel */}
      <rect x={cx-82} y={cy-14} width="12" height="28" fill="#0a1830" stroke={C.blue} strokeWidth="0.8"/>
      <line x1={cx-76} y1={cy-14} x2={cx-76} y2={cy+14} stroke={C.blue} strokeWidth="0.5" opacity="0.6"/>
      <line x1={cx-82} y1={cy-5} x2={cx-70} y2={cy-5} stroke={C.blue} strokeWidth="0.4" opacity="0.4"/>
      <line x1={cx-82} y1={cy+5} x2={cx-70} y2={cy+5} stroke={C.blue} strokeWidth="0.4" opacity="0.4"/>
      <circle cx={cx-82} cy={cy} r="2.5" fill={C.blue} opacity="0.9"/>
      {/* E solar panel */}
      <rect x={cx+70} y={cy-14} width="12" height="28" fill="#0a1830" stroke={C.blue} strokeWidth="0.8"/>
      <line x1={cx+76} y1={cy-14} x2={cx+76} y2={cy+14} stroke={C.blue} strokeWidth="0.5" opacity="0.6"/>
      <line x1={cx+70} y1={cy-5} x2={cx+82} y2={cy-5} stroke={C.blue} strokeWidth="0.4" opacity="0.4"/>
      <line x1={cx+70} y1={cy+5} x2={cx+82} y2={cy+5} stroke={C.blue} strokeWidth="0.4" opacity="0.4"/>
      <circle cx={cx+82} cy={cy} r="2.5" fill={C.blue} opacity="0.9"/>
      {/* N cap */}
      <rect x={cx-7} y={cy-71} width="14" height="5" fill="#1a1248" stroke={C.blue} strokeWidth="0.7" rx="2"/>
      <circle cx={cx} cy={cy-71} r="1.5" fill={C.red} opacity="0.85"/>
      {/* Hub ring */}
      <circle cx={cx} cy={cy} r="32" fill="none" stroke={C.purple} strokeWidth="0.8" opacity="0.3"/>
      {/* Hub body */}
      <polygon points={hexPts.join(" ")} fill="#0e0830" stroke={C.purple} strokeWidth="1.5"/>
      {/* Hub inner details */}
      <circle cx={cx} cy={cy} r="16" fill="none" stroke={C.purple} strokeWidth="0.6" opacity="0.5"/>
      <circle cx={cx} cy={cy} r="9" fill="#1a0848" stroke={C.purple} strokeWidth="1"/>
      <circle cx={cx} cy={cy} r="4" fill={C.purple} opacity="0.9"/>
      {/* Hub windows */}
      <circle cx={cx-11} cy={cy-7} r="2.5" fill={C.blue} opacity="0.55"/>
      <circle cx={cx+11} cy={cy-7} r="2.5" fill={C.blue} opacity="0.55"/>
      <circle cx={cx} cy={cy+13} r="2.5" fill={C.purple} opacity="0.6"/>
      {/* Docking collar */}
      <rect x={cx-9} y={cy+82} width="18" height="7" fill="#1a0840" stroke={C.purple} strokeWidth="1.2" rx="2"/>
      <circle cx={cx-5} cy={cy+84} r="1.5" fill={C.cyan} opacity="0.9"/>
      <circle cx={cx+5} cy={cy+84} r="1.5" fill={C.cyan} opacity="0.9"/>
      {/* Docked ship */}
      <polygon points={shipPts} fill={shipColor} opacity="0.85"/>
      <ellipse cx={cx} cy={shipType==="large"?cy+121:shipType==="medium"?cy+116:cy+106} rx="5" ry="2" fill={shipColor} opacity="0.35"/>
      {/* Ship cockpit highlight */}
      <circle cx={cx} cy={cy+97} r="2" fill="white" opacity="0.3"/>
    </svg>
  );
}

// ─── STARBASE (tabbed) ───────────────────────────────────────
function StarbaseView(props){
  var player=props.player,rover=props.rover,onBuy=props.onBuy,onLeave=props.onLeave,onBuyFuel=props.onBuyFuel,onRepair=props.onRepair,onBuyPod=props.onBuyPod,onBuyShip=props.onBuyShip,onSell=props.onSell;
  var [tab,setTab]=useState("services");
  var usedCargo=shipCargoUsed(player),maxCargo=shipCargoMax(player);
  var cargoPct=maxCargo>0?Math.round((usedCargo/maxCargo)*100):0;
  var hullDamage=player.maxHull-Math.round(player.hull);
  var repairCost=hullDamage*2;
  var currentShip=SHIPS[player.shipType]||SHIPS.small;
  var canBuyPod=player.cargoPods<currentShip.maxPods;
  var tabBtn=function(key,color){return Object.assign({},bs(tab===key?color:C.dim,true),{padding:"8px 4px",fontSize:"12px"});};
  var SYS_SHIP=["shields","weapons","engines","sensors","reactor","hull"];
  var SYS_ROVER=["roverChassis","roverSensor","roverLaser","roverCargo"];
  var COLS={shields:C.blue,weapons:C.red,engines:C.green,sensors:C.cyan,reactor:C.yellow,hull:C.orange,roverChassis:"#cc88ff",roverSensor:"#88ccff",roverLaser:"#ff8888",roverCargo:"#88ffcc"};
  var LABELS={shields:"Shields",weapons:"Weapons",engines:"Engines",sensors:"Sensors",reactor:"Reactor",hull:"Hull",roverChassis:"Rover Chassis",roverSensor:"Rover Sensor",roverLaser:"Rover Laser",roverCargo:"Rover Cargo"};

  var SYS_MAX={shields:2,weapons:2,engines:2,sensors:2,reactor:2,hull:2,roverChassis:2,roverSensor:2,roverLaser:2,roverCargo:2};

  function renderUpgradeList(sysList){
    return sysList.map(function(sys){
      var maxLv=SYS_MAX[sys]||2;
      var level=player.upgrades[sys]||0,maxed=level>=maxLv;
      var upg=maxed?null:UPGRADES[sys][level];
      var color=COLS[sys];
      var canAfford=upg?Object.entries(upg.cost).every(function(e){return (e[0]==="credits"?player.credits:(player.resources[e[0]]||0))>=e[1];}):false;
      return(
        <div key={sys} style={{background:C.panel,border:"1px solid "+color+"22",borderRadius:"10px",padding:"10px 12px",marginBottom:"6px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:"13px",fontWeight:"700",color:color,letterSpacing:"1px"}}>{LABELS[sys]||sys}</div>
              <div style={{fontSize:"12px",color:C.dim,marginTop:"2px"}}>Lv {level}/{maxLv} {upg?"• "+upg.desc:"• MAXED"}</div>
              {upg&&<div style={{fontSize:"12px",color:canAfford?C.dim:C.red+"aa",marginTop:"2px"}}>{Object.entries(upg.cost).map(function(e){return e[1]+" "+e[0];}).join(" + ")}</div>}
            </div>
            {!maxed?<button onClick={function(){onBuy(sys);}} style={bs(canAfford?color:C.dim,canAfford)} disabled={!canAfford}>Upgrade</button>:<span style={{fontSize:"13px",color:color}}>★ MAX</span>}
          </div>
        </div>
      );
    });
  }

  return(
    <div>
      <StationSVG shipType={player.shipType}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div><div style={{fontSize:"17px",fontWeight:"700",color:"#ffffff"}}>⬡ STARBASE</div><div style={{fontSize:"12px",color:C.dim}}>Docked: {(SHIPS[player.shipType]||SHIPS.small).name}</div></div>
        <button onClick={onLeave} style={bs(C.dim,true)}>Undock</button>
      </div>
      <div style={{background:C.panel,padding:"8px 10px",borderRadius:"10px",border:"1px solid "+C.border,fontSize:"12px",marginBottom:"10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
          <span style={{color:C.dim}}>M:<span style={{color:C.text,marginLeft:"2px"}}>{player.resources.metals}</span> C:<span style={{color:C.text,marginLeft:"2px"}}>{player.resources.crystals}</span> T:<span style={{color:C.text,marginLeft:"2px"}}>{player.resources.tech}</span> F:<span style={{color:C.text,marginLeft:"2px"}}>{player.resources.fuel}</span></span>
          <span style={{color:C.yellow}}>Cr: {player.credits}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",color:C.dim,marginBottom:"2px"}}><span>Ship cargo ({player.cargoPods} pods)</span><span style={{color:cargoPct>80?C.red:C.dim}}>{usedCargo}/{maxCargo} ({cargoPct}%)</span></div>
        <div style={{height:"3px",background:"rgba(255,255,255,0.08)",borderRadius:"2px"}}><div style={{width:cargoPct+"%",height:"100%",background:cargoPct>80?C.red:C.cyan,borderRadius:"2px"}}/></div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"12px"}}>
        <button onClick={function(){setTab("services");}} style={tabBtn("services",C.cyan)}>⚙ Services</button>
        <button onClick={function(){setTab("ship");}} style={tabBtn("ship",C.purple)}>🚀 Ship</button>
        <button onClick={function(){setTab("rover");}} style={tabBtn("rover",C.green)}>🔴 Rover</button>
      </div>

      {tab==="services"&&(
        <div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            <div style={{background:C.panel,border:"1px solid "+C.green+"33",borderRadius:"10px",padding:"12px"}}>
              <div style={{fontSize:"13px",fontWeight:"700",color:C.green,marginBottom:"4px"}}>Hull Repair</div>
              <div style={{fontSize:"13px",color:C.dim,marginBottom:"8px"}}>Damage: {hullDamage} pts → Cost: {repairCost} cr</div>
              <button onClick={onRepair} style={bs(hullDamage>0&&player.credits>=repairCost?C.green:C.dim,hullDamage>0&&player.credits>=repairCost)} disabled={hullDamage===0||player.credits<repairCost}>{hullDamage===0?"Hull Intact":"Repair (+"+hullDamage+")"}</button>
            </div>
            <div style={{background:C.panel,border:"1px solid "+C.yellow+"33",borderRadius:"10px",padding:"12px"}}>
              <div style={{fontSize:"13px",fontWeight:"700",color:C.yellow,marginBottom:"4px"}}>Buy Fuel</div>
              <div style={{fontSize:"13px",color:C.dim,marginBottom:"8px"}}>+20 fuel for 30 cr</div>

            <div style={{background:C.panel,border:"1px solid "+C.orange+"33",borderRadius:"10px",padding:"12px"}}>

              <div style={{fontSize:"12px",color:C.dim,marginBottom:"8px"}}>Rates: metals {SELL_RATES.metals}cr • crystals {SELL_RATES.crystals}cr • tech {SELL_RATES.tech}cr • fuel {SELL_RATES.fuel}cr per unit</div>

                    <button key={res} onClick={function(){onSell(res);}} style={Object.assign({},bs(amt>0?resColors2[res]:C.dim,amt>0),{padding:"7px 8px",fontSize:"13px",textAlign:"left"})} disabled={amt<=0}>
                      <div style={{fontWeight:"700",textTransform:"capitalize"}}>{res}</div>

      {tab==="ship"&&(

          </div>

            var ship=SHIPS[key];

            var canAfford=cost&&Object.entries(cost).every(function(e){return (e[0]==="credits"?player.credits:(player.resources[e[0]]||0))>=e[1];});
            var alreadyOwn=player.shipType===key;
            return(
              <div key={key} style={{background:C.panel,border:"1px solid "+C.purple+"22",borderRadius:"10px",padding:"10px 12px",marginBottom:"6px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:"#ffffff"}}>{ship.name}</div>
                    <div style={{fontSize:"12px",color:C.dim,marginTop:"2px"}}>Hull {ship.maxHull} • Shields {ship.maxShields} • Max {ship.maxPods} pods</div>
                    {cost&&<div style={{fontSize:"12px",color:canAfford?C.dim:C.red+"aa",marginTop:"2px"}}>{Object.entries(cost).map(function(e){return e[1]+" "+e[0];}).join(" + ")}</div>}
                  </div>
                  {alreadyOwn?<span style={{fontSize:"13px",color:C.cyan}}>✓ Owned</span>:<button onClick={function(){onBuyShip(key);}} style={bs(canAfford?C.cyan:C.dim,canAfford)} disabled={!canAfford}>Purchase</button>}
                </div>

        </div>
      )}

      {tab==="rover"&&(
        <div>{renderUpgradeList(SYS_ROVER)}</div>
      )}
    </div>
  );
}
